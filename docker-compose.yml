# Hold — standalone dev stack
# Slice 1: Postgres (the heart of the shared core).
# Supavisor / Garage / GoTrue land in upcoming slices.
services:
  db:
    image: postgres:16-alpine
    container_name: hold-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - hold_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hold_pgdata:
