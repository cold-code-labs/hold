# Hold — production stack (deployed via Coolify).
# db + control-plane + project-zero auth (GoTrue) + panel, as one resource.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - hold_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  control-plane:
    build:
      context: .
      dockerfile: control-plane/Dockerfile
    environment:
      HOLD_DB_ADMIN_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      HOLD_API_PORT: "8787"
      HOLD_API_KEY: ${HOLD_API_KEY}
      HOLD_JWT_SECRET: ${HOLD_JWT_SECRET}
      HOLD_ZERO_DB: hold_zero
      HOLD_GOTRUE_URL: http://auth:9999
      HOLD_MASTER_EMAIL: ${HOLD_MASTER_EMAIL}
      HOLD_MASTER_PASSWORD: ${HOLD_MASTER_PASSWORD}
      # Supavisor pooler (internal). The control plane creates the `_supabase`
      # metadata db at bootstrap and routes new projects through the pooler.
      HOLD_POOLER_API_URL: http://pooler:4000
      SUPAVISOR_API_JWT_SECRET: ${SUPAVISOR_API_JWT_SECRET}
      HOLD_POOLER_UPSTREAM_HOST: db
      HOLD_POOLER_UPSTREAM_PORT: "5432"
      HOLD_POOLER_HOST: pooler
      HOLD_POOLER_PORT: "6543"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8787/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
    # Reachable only over the WireGuard link (surtr's private IP), never the
    # public internet. Heimdall (on ymir) calls it across WireGuard with the
    # bearer key. Internal services still reach it as control-plane:8787.
    ports:
      - "10.10.0.2:8787:8787"
    restart: unless-stopped

  # Project zero auth. Starts only after the control plane has prepared the
  # hold_zero database (schema + search_path), so GoTrue migrates cleanly.
  auth:
    image: supabase/gotrue:v2.190.0
    environment:
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/hold_zero?sslmode=disable
      GOTRUE_DB_NAMESPACE: auth
      GOTRUE_SITE_URL: ${HOLD_SITE_URL:-https://hold.coldcodelabs.com}
      GOTRUE_API_EXTERNAL_URL: ${HOLD_SITE_URL:-https://hold.coldcodelabs.com}
      API_EXTERNAL_URL: ${HOLD_SITE_URL:-https://hold.coldcodelabs.com}
      GOTRUE_JWT_SECRET: ${HOLD_JWT_SECRET}
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_DISABLE_SIGNUP: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_API_HOST: 0.0.0.0
      PORT: "9999"
    depends_on:
      control-plane:
        condition: service_healthy
    restart: unless-stopped

  panel:
    build:
      context: ./panel
      dockerfile: Dockerfile
    environment:
      HOLD_API_URL: http://control-plane:8787
      HOLD_GOTRUE_URL: http://auth:9999
      HOLD_JWT_SECRET: ${HOLD_JWT_SECRET}
    depends_on:
      - control-plane
    restart: unless-stopped
    expose:
      - "3000"

  # Multi-tenant connection pooler. Tenants (one per project) are provisioned
  # via its management API by the control plane. Starts after the control plane
  # is healthy, so the `_supabase` metadata db already exists. Internal only.
  pooler:
    image: supabase/supavisor:2.9.7
    command: ["/bin/sh", "-c", "/app/bin/migrate && /app/bin/server"]
    environment:
      PORT: "4000"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: _supabase
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DATABASE_URL: ecto://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/_supabase
      SECRET_KEY_BASE: ${SUPAVISOR_SECRET_KEY_BASE}
      VAULT_ENC_KEY: ${SUPAVISOR_VAULT_ENC_KEY}
      API_JWT_SECRET: ${SUPAVISOR_API_JWT_SECRET}
      METRICS_JWT_SECRET: ${SUPAVISOR_API_JWT_SECRET}
      CLUSTER_POSTGRES: "true"
      REGION: local
      ERL_AFLAGS: -proto_dist inet_tcp
      POOLER_TENANT_ID: hold
      POOLER_DEFAULT_POOL_SIZE: "10"
      POOLER_MAX_CLIENT_CONN: "100"
      POOLER_POOL_MODE: transaction
      DB_POOL_SIZE: "5"
    depends_on:
      control-plane:
        condition: service_healthy
    expose:
      - "4000"
      - "6543"
    restart: unless-stopped

volumes:
  hold_pgdata:
